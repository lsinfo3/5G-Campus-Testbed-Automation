
---

# INFO: this task runs the python traffic generation
# WARNING: this requires a traffic sink to be set up on the target(=core)

- name: copy script
  ansible.builtin.copy:
    src: ../../../scripts/5g-scapy-client.py
    dest: /home/{{ ansible_user_id }}/5g-scapy-client.py
    mode: '755'
  become: false

# TODO: timeout(max duration)!
# TODO: redirect stdout/stderr to file and move to host
- name: Python traffic gen
  ansible.builtin.command:
     argv:
        - "/home/{{ ansible_user_id }}/5g-scapy-client.py"
        - "{{ tg_proto }}"
        - "{{ tg_dist }}"
        - "{{ tg_iat }}"
        - "{{ tg_size }}"
        - "{{ tg_count }}"
        - "{{ tg_ip }}"
        - "{{ tg_port }}"
        - "{{ tg_burst }}"
  become: true

#     tg_proto: "{{ item.traffic_config.scapy_proto }}"
#     tg_dist: "{{ item.traffic_config.scapy_dist }}"
#     tg_iat: "{{ item.traffic_config.scapy_iat }}"
#     tg_size: "{{ item.traffic_config.scapy_size }}"
#     tg_amount: "{{ item.traffic_config.scapy_amount }}"
#     tg_ip: "{{ item.traffic_config.scapy_ip }}"
#     tg_port: "{{ item.traffic_config.scapy_port }}"
#     tg_burst: "{{ item.traffic_config.scapy_burst }}"
