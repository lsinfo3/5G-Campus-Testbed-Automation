




# INFO: kill running OAI/SRS instances
- name: '"{{ item.identifier }}": killall running gnb instances'
  # Pkill requires "[]"-matching shenanigans to prevent matching itself...
  ansible.builtin.shell: |
     killall gnb 2>/dev/null || true
     killall nr-softmodem 2>/dev/null || true
     killall read-snr.sh 2>/dev/null || true
     pkill -9 -f /[h]ome/{{ ansible_user_id }}/tinkerforge_power.py || true
  become: true
- name:  '"{{ item.identifier }}": killall running gnb instances in docker containers'
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true


- name: '"{{ item.identifier }}": create log dir'
  ansible.builtin.file:
    path: "{{ collected_logs }}"
    state: directory


  # TODO: is this required?
- name: '"{{ item.identifier }}": Switch UHD version'
  ansible.builtin.include_role:
    name: UHD
  vars:
    version: "{{ item.gnb_version.uhd_version }}"
  when: item.dockerization != true


# INFO: powercycle USB hub and wait!
- name: '"{{ item.identifier }}": power off modem'
  ansible.builtin.shell:
    # cmd: "uhubctl --action off --location 2-3 --location 3-3 2>&1"
    cmd: "uhubctl --action off --location 3-4.2 --location 2-4.2  > {{ collected_logs }}/uhubctl 2>&1"
  become: true
- wait_for:
    timeout: 2
- name: '"{{ item.identifier }}": powercycle modem'
  ansible.builtin.shell:
     cmd: "/home/gnb/usb_resetter --device 2109:0817 --reset-device > {{ collected_logs }}/usb_resetter 2>&1"
  become: true
- wait_for:
    timeout: 20


- name: '"{{ item.identifier }}": Enable performance tuning options if wanted'
  when: system.fixed_params.performance_tuning
  block:
    - name: Copy script
      ansible.builtin.copy:
        src: "../scripts/srsran_performance"
        dest: "srsran_performance"
        mode: "755"
    - name: Run script
      ansible.builtin.shell: "bash /home/{{ ansible_user_id }}/srsran_performance > {{ collected_logs }}/srsran_performance 2>&1"
      become: true

# INFO: edit config and start gnb application and wait!
# TODO: this block is to big, break it up, move it to role or do whatever but dont keep it
- name: '"{{ item.identifier }}": Run role'
  ansible.builtin.include_role:
    name: SRS_config
  vars:
    srs_version: "{{ item.gnb_version.version }}"
  when: item.gnb_version.type== 'srsRAN'
- name: register gnb_srs_binary path
  ansible.builtin.set_fact:
    gnb_srs_binary: "/home/gnb/gnb_versions/{{ item.gnb_version.uhd_version }}/SRS--{{ item.gnb_version.version }}--{{ item.gnb_version.commit }}/build/apps/gnb/gnb"
  when: item.gnb_version.type== 'srsRAN' and item.dockerization != true
- name: Launch SRS gNB (non-docker)
  shell: "perf stat -I 20 -e cycles,instructions,cache-misses,dTLB-load-misses --delay=5000 -o {{ perf_output_csv }} -- {{ gnb_srs_binary }} -c {{ gnb_srs_config_path }} 2>&1 | ts '%.s' > {{ collected_logs }}/srsran"
  become: true
  async: 900
  poll: 0
  register: gnb_job_srs
  when: item.gnb_version.type== 'srsRAN' and item.dockerization != true
  # TODO: write stdout to usefull location
- shell: "touch {{ gnb_srs_logfile_path }}"
  become: true
  when: item.gnb_version.type== 'srsRAN' and item.dockerization == true
- name: Launch SRS gNB (docker)
  shell: "docker run --rm --privileged --device /dev/bus/usb/:/dev/bus/usb/ --network=host --volume {{ gnb_srs_config_path }}:/srsran_config.yaml --volume {{ gnb_srs_logfile_path }}:{{ gnb_srs_logfile_path }} {{ docker_tags_map[item.gnb_version.version][item.gnb_version.uhd_version] }} >/tmp/srsdocker 2>&1"
  become: true
  async: 900
  poll: 0
  register: gnb_job_srs_docker
  when: item.gnb_version.type== 'srsRAN' and item.dockerization == true
- name: '"{{ item.identifier }}": Run role'
  ansible.builtin.include_role:
    name: OAI_config
  when: item.gnb_version.type== 'OAI'
- name: register gnb_oai_binary path
  ansible.builtin.set_fact:
    gnb_oai_binary: "/home/gnb/gnb_versions/{{ item.gnb_version.uhd_version }}/OAI--{{ item.gnb_version.version }}--{{ item.gnb_version.commit }}/cmake_targets/ran_build/build/nr-softmodem"
  when: item.gnb_version.type== 'OAI' and item.dockerization != true
- name: Launch OAI gNB (non-docker)
  shell: "perf stat -I 20 -e cycles,instructions,cache-misses,dTLB-load-misses --delay=5000 -o {{ perf_output_csv }} -- {{ gnb_oai_binary }} -O {{ gnb_oai_config_path }} -E --sa --continuous-tx 2>&1 | ts '%.s' > {{ gnb_oai_logfile_path }} 2>&1" # pipe stdout+stderr to ts to get timestamps in the log
  become: true
  async: 900
  poll: 0
  register: gnb_job_oai
  when: item.gnb_version.type== 'OAI' and item.dockerization != true
- shell: "touch {{ gnb_oai_logfile_path }}"
  become: true
  when: item.gnb_version.type == 'OAI' and item.dockerization == true
- name: Launch OAI gNB (docker)
  shell: "docker run --rm --privileged --device /dev/bus/usb/:/dev/bus/usb/ --network=host --volume {{ gnb_oai_config_path }}:/oai_config.conf --volume {{ gnb_oai_logfile_path }}:{{ gnb_oai_logfile_path }} {{ docker_tags_map[item.gnb_version.version][item.gnb_version.uhd_version] }} 2>&1 | ts '%.s' > {{ gnb_oai_logfile_path }} 2>&1" # pipe stdout+stderr to ts to get timestamps in the log
  become: true
  async: 900
  poll: 0
  register: gnb_job_oai_docker
  when: item.gnb_version.type == 'OAI' and item.dockerization == true
- name: Save gnb_job (non-docker)
  ansible.builtin.set_fact:
    gnb_job: "{{ gnb_job_oai if gnb_job_oai.ansible_job_id is defined else gnb_job_srs }}"
  when: item.dockerization != true
- name: Save gnb_job (docker)
  ansible.builtin.set_fact:
    gnb_job: "{{ gnb_job_oai_docker if gnb_job_oai_docker.ansible_job_id is defined else gnb_job_srs_docker }}"
  when: item.dockerization == true

- name: '"{{ item.identifier }}": Wait for 60 seconds until gNB becomes ready'
  wait_for:
    timeout: 60

# INFO: Check if gnb is running
- name: '"{{ item.identifier }}": get gnb_job status'
  ansible.builtin.async_status:
    jid: "{{ gnb_job.ansible_job_id }}"
  register: gnb_job_results
  ignore_errors: true
  become: true
- name: "{{ item.identifier }}: check if failed"
  ansible.builtin.set_fact:
    gnb_job_failed: "{{ gnb_job_results.failed != 0 or gnb_job_results.finished != 0 }}"
- name: "{{ item.identifier }}: save cause of failure"
  ansible.builtin.set_fact:
    gnb_job_failed_cause: "gnb"
  when: gnb_job_failed
- block:
   - name: '"{{ item.identifier }}": job status of faulty run'
     debug:
        msg:
          - "{{ gnb_job_results }}"
   # - name: '"{{ item.identifier }}": Exit faulty run'
   #   ansible.builtin.meta: end_play
  when: gnb_job_failed

# INFO: get ip for modem
- name: '"{{ item.identifier }}": Acquire IP for modem'
  # shell: "bash /home/gnb/setip.sh 2>&1 | ts '%.s' > {{ collected_logs }}/setip "
  # shell: " ( f(){ \"$@\" 2>&1 | ts %.s; return ${PIPESTATUS[0]}; }; f bash /home/gnb/setip.sh > {{ collected_logs }}/setip ) "  # If we pipe, the first returncode get's swalloed. Therefore we wrap it in a function and use the PIPESTATUS array which stores return code
  shell: "bash -c  '( f(){ \"$@\" 2>&1 | ts %.s; return ${PIPESTATUS[0]}; }; f bash /home/gnb/setip.sh > {{ collected_logs }}/setip )' "  # If we pipe, the first returncode get's swalloed. Therefore we wrap it in a function and use the PIPESTATUS array which stores return code
  register: get_ip_shell_script
  ignore_errors: true
  become: true
  when: not gnb_job_failed
- name: '"{{ item.identifier }}": Error handling of ip connections shell script'
  when: not gnb_job_failed and get_ip_shell_script.rc != 0
  ansible.builtin.set_fact:
    gnb_job_failed_cause: "getip"
    gnb_job_failed: true


# INFO: start power measurement
- name: copy power msm script
  ansible.builtin.copy:
    src: "../scripts/tinkerforge_power.py"
    dest: "/home/{{ ansible_user_id }}/tinkerforge_power.py"
    mode: "755"
- block:
  - name: Start power msm script for ue
    ansible.builtin.shell: "/home/{{ ansible_user_id }}/tinkerforge_power.py --host={{ tinkerforge.ue.host }} --uid={{ tinkerforge.ue.uid }} --path={{ tinkerforge.ue.output }} --duration={{ 898 }}  > {{ collected_logs }}/tinker_ue 2>&1"
    become: true
    async: 900
    poll: 0
    register: pwr_ue_job
  when: tinkerforge is defined and tinkerforge.ue is defined
- block:
  - name: Start power msm script for sdr
    ansible.builtin.shell: "/home/{{ ansible_user_id }}/tinkerforge_power.py --host={{ tinkerforge.sdr.host }} --uid={{ tinkerforge.sdr.uid }} --path={{ tinkerforge.sdr.output }} --duration={{ 898 }}  > {{ collected_logs }}/tinker_sdr 2>&1"
    become: true
    async: 900
    poll: 0
    register: pwr_sdr_job
  when: tinkerforge is defined and tinkerforge.sdr is defined



# INFO: log SNR,SiNR,PSRP, etc
- name: copy qmi SNR monitor
  ansible.builtin.copy:
    src: "../config/read-snr.sh"
    dest: "{{ snr_msm_script }}"
    mode: "755"
  become: true

- name: Launch qmi SNR monitor
  ansible.builtin.shell: "{{ snr_msm_script }}"
  become: true
  async: 120
  poll: 0
  register: snr_job



# INFO: this block catches all other tasks, appart from the cleanup
- name: "{{ item.identifier }}: Main routine"
  when: not gnb_job_failed
  block:
  - name: '"{{ item.identifier }}": Wait for 10 seconds after obtaining IP'
    wait_for:
      timeout: 10
  # TODO: save gnb stdout/stderr on failure
  # TODO: on failure: save stdout/stderr and gnb.log
  # TODO: track failed runs in evaluation?
  - name: '"{{ item.identifier }}": tcpdump on gnb'
    ansible.builtin.command:
      cmd: sudo timeout {{ item.traffic_config.traffic_duration + 15 }} tcpdump -ni {{ system.fixed_params.interface_gnb }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_gnb.pcap udp port 2152
    async: "{{ item.traffic_config.traffic_duration * 2 }}"
    poll: 0
    become: true
    register: tcpdump_gnb

  - name: '"{{ item.identifier }}": tcpdump on ue'
    ansible.builtin.command:
      cmd: sudo timeout {{ item.traffic_config.traffic_duration + 15 }} tcpdump -ni {{ system.fixed_params.interface_ue }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_ue.pcap
    async: "{{ item.traffic_config.traffic_duration * 2 }}"
    poll: 0
    become: true
    register: tcpdump_ue

  - name: '"{{ item.identifier }}": sleep'
    ansible.builtin.command:
       cmd: sleep 10
    become: false


  # INFO: ensure route to core is set? wrong routes were set before
  # TODO: hardcoded ip addr :/
  - name: Delete old route
    ansible.builtin.shell: |
       ip route del 10.45.0.0/24 dev {{ system.fixed_params.interface_ue }} || true
    become: true
  - name: Create new route
    ansible.builtin.shell: |
       ip route add 10.45.0.0/24 dev {{ system.fixed_params.interface_ue }}
    become: true


  - name: '"{{ item.identifier }}": run ping role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: icmp.yaml
    vars:
      icmp_intervall: "{{ item.traffic_config.iat }}"
      icmp_count: "{{ item.traffic_config.count }}"
    when: item.traffic_config.traffic_type== 'ping'
  - name: '"{{ item.identifier }}": run idle role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: idle.yaml
    vars:
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
    when: item.traffic_config.traffic_type== 'idle'
  - name: '"{{ item.identifier }}": run udp scapy ping traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: scapy-udp-ping.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_dist: "{{ item.traffic_config.dist }}"
      tg_iat: "{{ item.traffic_config.iat }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_count: "{{ item.traffic_config.count }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_burst: "{{ item.traffic_config.burst }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_direction: "{{ item.traffic_config.direction }}"
    when: item.traffic_config.traffic_type == 'scapyudpping'
  - name: '"{{ item.identifier }}": run udp scapy throughput traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: scapy-udp-throughput.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_dist: "{{ item.traffic_config.dist }}"
      tg_iat: "{{ item.traffic_config.iat }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_count: "{{ item.traffic_config.count }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_burst: "{{ item.traffic_config.burst }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_direction: "{{ item.traffic_config.direction }}"
    when: item.traffic_config.traffic_type == 'scapyudpthroughput'
  - name: '"{{ item.identifier }}": run udp iperf traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: iperf-udp-throughput.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_direction: "{{ item.traffic_config.direction }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_rate: "{{ item.traffic_config.rate }}"
    when: item.traffic_config.traffic_type == 'iperfthroughput'
  # - name: '"{{ item.identifier }}": check for iperf errors'
  #   ansible.builtin.debug:
  #     msg: "{{iperf_ret}}"
  #   when: item.traffic_config.traffic_type == 'iperfthroughput'
  - name: '"{{ item.identifier }}": check for iperf errors'
    ansible.builtin.set_fact:
      gnb_job_failed_cause: "broken pipe"
      gnb_job_failed: true
    when: item.traffic_config.traffic_type == 'iperfthroughput' and iperf_ret.rc != 0

  - name: '"{{ item.identifier }}": wait for gnb tcpdump'
    ansible.builtin.async_status:
       jid: "{{ tcpdump_gnb.ansible_job_id }}"
    register: tcpdump_gnb_result
    until: tcpdump_gnb_result.finished
    failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
    retries: 10
    delay: 5
    become: true

  - name: '"{{ item.identifier }}": wait for ue tcpdump'
    ansible.builtin.async_status:
       jid: "{{ tcpdump_ue.ansible_job_id }}"
    register: tcpdump_ue_result
    until: tcpdump_ue_result.finished
    failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
    retries: 10
    delay: 5
    become: true



# INFO: cleanup block
- name: "{{ item.identifier }}: cleanup tasks"
  block:
  # Copy pcaps and params to localhost
  - name: "{{ item.identifier }}: Copy config to local: make dir"
    ansible.builtin.file:
       path: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
       state: directory
    delegate_to: localhost

  - name: "{{ item.identifier }}: Remove perf stats counter"
    ansible.builtin.file:
       path: "{{ perf_output_csv }}"
       state: absent
    become: true
    ignore_errors: true
    when: gnb_job_failed

  - name: "{{ item.identifier }}: Write FAILED label"
    ansible.builtin.copy:
      content: "{{ gnb_job_failed_cause }}"
      dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/FAILED"
    delegate_to: localhost
    when: gnb_job_failed

  - name: '"{{ item.identifier }}": Copy SNR measurements'
    ansible.builtin.fetch:
       src: "{{ snr_msm_script_output }}"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
       flat: true
       validate_checksum: false
    become: false

  # TODO: include start and end timestamp in yaml!!
  - name: "{{ item.identifier }}: Copy config to local: copy"
    ansible.builtin.copy:
       content: "{{ system.fixed_params | ansible.builtin.combine( item ) }}"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/{{ item.identifier }}.yaml"
    delegate_to: localhost

  - name: "{{ item.identifier }}: Copy shell output to local: compress"
    community.general.archive:
       path: "{{ collected_logs }}"
       dest: "{{ collected_logs }}.tar.gz"
       format: gz
       force_archive: true
       unsafe_writes: false
  - name: "{{ item.identifier }}: Copy shell output to local: copy"
    ansible.builtin.fetch:
       src: "{{ collected_logs }}.tar.gz"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/shell_output.tar.gz"
       flat: true
       validate_checksum: false
    become: true
    # delegate_to: localhost

  # TODO: fails for some reason, using shell for now
  - name: "{{ item.identifier }}: Copy shell output to local: remove old"
    ansible.builtin.file:
       path: "{{ collected_logs }}"
       state: absent
    become: true

  - name: "{{ item.identifier }}: Stop power measurements"
    ansible.builtin.shell: |
      pkill -9 -f /[h]ome/{{ ansible_user_id }}/tinkerforge_power.py || true
    become: true
  - block:
    - name: "{{ item.identifier }}: Copy ue power measurements to local"
      ansible.builtin.fetch:
        src: "{{ tinkerforge.ue.output }}"
        dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
        flat: true
        validate_checksum: false
      become: true
    # - name: "{{ item.identifier }}: Copy shell output to local: remove old pwr"
    #   ansible.builtin.file:
    #      path: "{{ tinkerforge.ue.output }}"
    #      state: absent
    #   become: true
    when: tinkerforge is defined and tinkerforge.ue is defined
  - block:
    - name: "{{ item.identifier }}: Copy sdr power measurements to local"
      ansible.builtin.fetch:
        src: "{{ tinkerforge.sdr.output }}"
        dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
        flat: true
        validate_checksum: false
      become: true
    when: tinkerforge is defined and tinkerforge.sdr is defined

  - name: '"{{ item.identifier }}": Copy gnb config'
    ansible.builtin.fetch:
       src: "{{ gnb_srs_config_path }}"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
       flat: true
    become: false
    when: item.gnb_version.type== 'srsRAN'
  - name: '"{{ item.identifier }}": Copy gnb config'
    ansible.builtin.fetch:
       src: "{{ gnb_oai_config_path }}"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
       flat: true
    become: false
    when: item.gnb_version.type== 'OAI'

  - block:
     - name: '"{{ item.identifier }}": Compress log'
       community.general.archive:
          path: "{{ gnb_srs_logfile_path }}"
          unsafe_writes: false
     - name: '"{{ item.identifier }}": Copy gnb log'
       ansible.builtin.fetch:
          src: "{{ gnb_srs_logfile_path }}.gz"
          dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
          flat: true
          validate_checksum: false
       become: false
     - name: '"{{ item.identifier }}": Remove remote gnb log'
       ansible.builtin.file:
          path: "{{ gnb_srs_logfile_path }}"
          state: absent
       become: true
     - name: '"{{ item.identifier }}": Remove remote gnb log archive'
       ansible.builtin.file:
          path: "{{ gnb_srs_logfile_path }}.gz"
          state: absent
       become: true
    when: item.gnb_version.type== 'srsRAN'
  - block:
     - name: '"{{ item.identifier }}": Compress log'
       community.general.archive:
          path: "{{ gnb_oai_logfile_path }}"
          unsafe_writes: false
     - name: '"{{ item.identifier }}": Copy gnb log'
       ansible.builtin.fetch:
          src: "{{ gnb_oai_logfile_path }}.gz"
          dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
          flat: true
          validate_checksum: false
       become: false
     - name: '"{{ item.identifier }}": Remove remote gnb log'
       ansible.builtin.file:
          path: "{{ gnb_oai_logfile_path }}"
          state: absent
       become: true
     - name: '"{{ item.identifier }}": Remove remote gnb log archive'
       ansible.builtin.file:
          path: "{{ gnb_oai_logfile_path }}.gz"
          state: absent
       become: true
    when: item.gnb_version.type== 'OAI'

  - name: "{{ item.identifier }}: Handle pcaps, etc."
    when: not gnb_job_failed
    block:
    - ansible.builtin.fetch:
         src: "{{ perf_output_csv }}"
         dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
         flat: true
      become: true
    - name: "{{ item.identifier }}: Remove perf stats counter"
      ansible.builtin.file:
         path: "{{ perf_output_csv }}"
         state: absent
      become: true
      ignore_errors: true
    - name: '"{{ item.identifier }}": Compress pcaps'
      block:
      - community.general.archive:
           path: /home/{{ ansible_user_id }}/tcpdump_gnb.pcap
           unsafe_writes: false
           remove: true
           owner: "{{ ansible_user_id }}"
        become: true
      - community.general.archive:
           path: /home/{{ ansible_user_id }}/tcpdump_ue.pcap
           unsafe_writes: false
           remove: true
           owner: "{{ ansible_user_id }}"
        become: true
    - name: '"{{ item.identifier }}": Copy pcaps'
      block:
      - ansible.builtin.fetch:
           src: /home/{{ ansible_user_id }}/tcpdump_gnb.pcap.gz
           dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
           flat: true
        become: false
      - ansible.builtin.fetch:
           src: /home/{{ ansible_user_id }}/tcpdump_ue.pcap.gz
           dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
           flat: true
        become: false
    - name: '"{{ item.identifier }}": Cleanup pcaps'
      block:
      - ansible.builtin.file:
           path: /home/{{ ansible_user_id }}/tcpdump_gnb.pcap.gz
           state: absent
        become: true
      - ansible.builtin.file:
           path: /home/{{ ansible_user_id }}/tcpdump_ue.pcap.gz
           state: absent
        become: true
