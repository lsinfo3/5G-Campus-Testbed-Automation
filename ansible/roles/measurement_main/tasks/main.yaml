
# We not onli want to init, but reset the existing array to not endlessly collect filepaths
- ansible.builtin.set_fact:
    all_artefacts: []


# FIXME: pre_cleanup
- name: Logging
  ansible.builtin.include_role:
    name: monitoring
    tasks_from: logging.yaml
  vars:
    log_prefix: "PRE_CLEANUP"
    log_message: "{{ item.identifier }}"
- name: "{{ item.identifier }}: MODULE: PRE_CLEANUP"
  ansible.builtin.include_role:
    name: module_handler
  loop: "{{ modules.pre_cleanup }}"
  loop_control:
    loop_var: module

# INFO: kill all possible interfering processes
- name: '"{{ item.identifier }}": killall running gnb instances'
  # Pkill requires "[]"-matching shenanigans to prevent matching itself...
  ansible.builtin.shell: |
     killall gnb 2>/dev/null || true
     killall nr-softmodem 2>/dev/null || true
  become: true
- name:  '"{{ item.identifier }}": killall running gnb instances in docker containers'
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true

- name: '"{{ item.identifier }}": create log dir'
  ansible.builtin.file:
    path: "{{ collected_artefacts }}"
    state: directory


# FIXME: pre_uhd_switch
- name: Logging
  ansible.builtin.include_role:
    name: monitoring
    tasks_from: logging.yaml
  vars:
    log_prefix: "PRE_UHD_SWITCH"
    log_message: "{{ item.identifier }}"
- name: "{{ item.identifier }}: MODULE: PRE_UHD_SWITCH"
  ansible.builtin.include_role:
    name: module_handler
  loop: "{{ modules.pre_uhd_switch }}"
  loop_control:
    loop_var: module
#

- name: '"{{ item.identifier }}": Switch UHD version'
  ansible.builtin.include_role:
    name: UHD
    tasks_from: switch_version.yaml
  vars:
    version: "{{ item.gnb_version.uhd_version }}"
  when: item.dockerization != true


- name: '"{{ item.identifier }}": Enable performance tuning options if wanted'
  when: system.fixed_params.performance_tuning
  block:
    - name: Copy script
      ansible.builtin.copy:
        src: "../scripts/srsran_performance"
        dest: "srsran_performance"
        mode: "755"
    - name: Run script
      ansible.builtin.shell: "bash /home/{{ ansible_user_id }}/srsran_performance > {{ collected_artefacts }}/srsran_performance 2>&1"
      become: true

# FIXME: pre_gnb_start
- name: Logging
  ansible.builtin.include_role:
    name: monitoring
    tasks_from: logging.yaml
  vars:
    log_prefix: "PRE_GNB_START"
    log_message: "{{ item.identifier }}"
- name: "{{ item.identifier }}: MODULE: PRE_GNB_START"
  ansible.builtin.include_role:
    name: module_handler
  loop: "{{ modules.pre_gnb_start }}"
  loop_control:
    loop_var: module


# INFO: edit config and start gnb application and wait!
# TODO: this block is to big, break it up, move it to role or do whatever but dont keep it
- name: '"{{ item.identifier }}": Run role'
  ansible.builtin.include_role:
    name: SRS_config
  vars:
    srs_version: "{{ item.gnb_version.version }}"
  when: item.gnb_version.type== 'srsRAN'
- name: register gnb_srs_binary path
  ansible.builtin.set_fact:
    gnb_srs_binary: "/home/gnb/gnb_versions/{{ item.gnb_version.uhd_version }}/SRS--{{ item.gnb_version.version }}--{{ item.gnb_version.commit }}/build/apps/gnb/gnb"
  when: item.gnb_version.type== 'srsRAN' and item.dockerization != true
- name: Launch SRS gNB (non-docker)
  shell: "perf stat -I 20 -e cycles,instructions,cache-misses,dTLB-load-misses --delay=5000 -o {{ perf_output_csv }} -- {{ gnb_srs_binary }} -c {{ gnb_srs_config_path }} 2>&1 | ts '%.s' > {{ collected_artefacts }}/srsran"
  become: true
  async: 900
  poll: 0
  register: gnb_job_srs
  when: item.gnb_version.type== 'srsRAN' and item.dockerization != true
  # TODO: write stdout to usefull location
- shell: "touch {{ gnb_srs_logfile_path }}"
  become: true
  when: item.gnb_version.type== 'srsRAN' and item.dockerization == true
- name: Launch SRS gNB (docker)
  shell: "docker run --rm --privileged --device /dev/bus/usb/:/dev/bus/usb/ --network=host --volume {{ gnb_srs_config_path }}:/srsran_config.yaml --volume {{ gnb_srs_logfile_path }}:{{ gnb_srs_logfile_path }} {{ docker_tags_map[item.gnb_version.version][item.gnb_version.uhd_version] }} >/tmp/srsdocker 2>&1"
  become: true
  async: 900
  poll: 0
  register: gnb_job_srs_docker
  when: item.gnb_version.type== 'srsRAN' and item.dockerization == true
- name: '"{{ item.identifier }}": Run role'
  ansible.builtin.include_role:
    name: OAI_config
  when: item.gnb_version.type== 'OAI'
- name: register gnb_oai_binary path
  ansible.builtin.set_fact:
    gnb_oai_binary: "/home/gnb/gnb_versions/{{ item.gnb_version.uhd_version }}/OAI--{{ item.gnb_version.version }}--{{ item.gnb_version.commit }}/cmake_targets/ran_build/build/nr-softmodem"
  when: item.gnb_version.type== 'OAI' and item.dockerization != true
- name: Launch OAI gNB (non-docker)
  shell: "perf stat -I 20 -e cycles,instructions,cache-misses,dTLB-load-misses --delay=5000 -o {{ perf_output_csv }} -- {{ gnb_oai_binary }} -O {{ gnb_oai_config_path }} -E --sa --continuous-tx 2>&1 | ts '%.s' > {{ gnb_oai_logfile_path }} 2>&1" # pipe stdout+stderr to ts to get timestamps in the log
  become: true
  async: 900
  poll: 0
  register: gnb_job_oai
  when: item.gnb_version.type== 'OAI' and item.dockerization != true
- shell: "touch {{ gnb_oai_logfile_path }}"
  become: true
  when: item.gnb_version.type == 'OAI' and item.dockerization == true
- name: Launch OAI gNB (docker)
  shell: "docker run --rm --privileged --device /dev/bus/usb/:/dev/bus/usb/ --network=host --volume {{ gnb_oai_config_path }}:/oai_config.conf --volume {{ gnb_oai_logfile_path }}:{{ gnb_oai_logfile_path }} {{ docker_tags_map[item.gnb_version.version][item.gnb_version.uhd_version] }} 2>&1 | ts '%.s' > {{ gnb_oai_logfile_path }} 2>&1" # pipe stdout+stderr to ts to get timestamps in the log
  become: true
  async: 900
  poll: 0
  register: gnb_job_oai_docker
  when: item.gnb_version.type == 'OAI' and item.dockerization == true
- name: Save gnb_job (non-docker)
  ansible.builtin.set_fact:
    gnb_job: "{{ gnb_job_oai if gnb_job_oai.ansible_job_id is defined else gnb_job_srs }}"
  when: item.dockerization != true
- name: Save gnb_job (docker)
  ansible.builtin.set_fact:
    gnb_job: "{{ gnb_job_oai_docker if gnb_job_oai_docker.ansible_job_id is defined else gnb_job_srs_docker }}"
  when: item.dockerization == true

- debug:
    msg: "{{ item.identifier }}: Wait until gNB becomes ready"
- name: '"{{ item.identifier }}": Wait until gNB becomes ready'
  wait_for:
    timeout: 50

# INFO: Check if gnb is running
- name: '"{{ item.identifier }}": get gnb_job status'
  ansible.builtin.async_status:
    jid: "{{ gnb_job.ansible_job_id }}"
  register: gnb_job_results
  ignore_errors: true
  become: true
- name: "{{ item.identifier }}: check if failed"
  ansible.builtin.set_fact:
    gnb_job_failed: "{{ gnb_job_results.failed != 0 or gnb_job_results.finished != 0 }}"
- name: "{{ item.identifier }}: save cause of failure"
  ansible.builtin.set_fact:
    gnb_job_failed_cause: "gnb"
  when: gnb_job_failed
- block:
   - name: '"{{ item.identifier }}": job status of faulty run'
     debug:
        msg:
          - "{{ gnb_job_results }}"
   # - name: '"{{ item.identifier }}": Exit faulty run'
   #   ansible.builtin.meta: end_play
  when: gnb_job_failed





# FIXME: pre_ue_connect
- name: Logging
  ansible.builtin.include_role:
    name: monitoring
    tasks_from: logging.yaml
  vars:
    log_prefix: "PRE_UE_CONNECT"
    log_message: "{{ item.identifier }}"
- name: "{{ item.identifier }}: MODULE: PRE_UE_CONNECT"
  ansible.builtin.include_role:
