#
#
# INFO: get ip for modem
- name: '"{{ item.identifier }}": Acquire IP for modem'
  # shell: "bash /home/gnb/setip.sh 2>&1 | ts '%.s' > {{ collected_artefacts }}/setip "
  # shell: " ( f(){ \"$@\" 2>&1 | ts %.s; return ${PIPESTATUS[0]}; }; f bash /home/gnb/setip.sh > {{ collected_artefacts }}/setip ) "  # If we pipe, the first returncode get's swalloed. Therefore we wrap it in a function and use the PIPESTATUS array which stores return code
  shell: "bash -c  '( f(){ \"$@\" 2>&1 | ts %.s; return ${PIPESTATUS[0]}; }; f bash /home/gnb/setip.sh > {{ collected_artefacts }}/setip )' "  # If we pipe, the first returncode get's swalloed. Therefore we wrap it in a function and use the PIPESTATUS array which stores return code
  register: get_ip_shell_script
  ignore_errors: true
  become: true
  when: not gnb_job_failed
- name: '"{{ item.identifier }}": Error handling of ip connections shell script'
  when: not gnb_job_failed and get_ip_shell_script.rc != 0
  ansible.builtin.set_fact:
    gnb_job_failed_cause: "getip"
    gnb_job_failed: true






# INFO: this block catches all other tasks, appart from the cleanup
- name: "{{ item.identifier }}: Main routine"
  when: not gnb_job_failed
  block:
  - name: '"{{ item.identifier }}": Wait for 5 seconds after obtaining IP'
    wait_for:
      timeout: 5
  # TODO: save gnb stdout/stderr on failure
  # TODO: on failure: save stdout/stderr and gnb.log
  # TODO: track failed runs in evaluation?
  - name: '"{{ item.identifier }}": tcpdump on gnb'
    ansible.builtin.command:
      cmd: sudo timeout {{ item.traffic_config.traffic_duration + 5 }} tcpdump -ni {{ system.fixed_params.interface_gnb }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_gnb.pcap udp port 2152
    async: "{{ item.traffic_config.traffic_duration * 2 }}"
    poll: 0
    become: true
    register: tcpdump_gnb

  - name: '"{{ item.identifier }}": tcpdump on ue'
    ansible.builtin.command:
      cmd: sudo timeout {{ item.traffic_config.traffic_duration + 5 }} tcpdump -ni {{ system.fixed_params.interface_ue }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_ue.pcap
    async: "{{ item.traffic_config.traffic_duration * 2 }}"
    poll: 0
    become: true
    register: tcpdump_ue

  - name: '"{{ item.identifier }}": sleep'
    ansible.builtin.command:
       cmd: sleep 5
    become: false



# FIXME: pre_traffic_start
  - name: Logging
    ansible.builtin.include_role:
      name: monitoring
      tasks_from: logging.yaml
    vars:
      log_prefix: "PRE_TRAFFIC_START"
      log_message: "{{ item.identifier }}"
  - name: "{{ item.identifier }}: MODULE: PRE_TRAFFIC_START"
    ansible.builtin.include_role:
      name: module_handler
    loop: "{{ modules.pre_traffic_start }}"
    loop_control:
      loop_var: module



  - name: '"{{ item.identifier }}": run ping role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: icmp.yaml
    vars:
      icmp_intervall: "{{ item.traffic_config.iat }}"
      icmp_count: "{{ item.traffic_config.count }}"
    when: item.traffic_config.traffic_type== 'ping'
  - name: '"{{ item.identifier }}": run idle role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: idle.yaml
    vars:
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
    when: item.traffic_config.traffic_type== 'idle'
  - name: '"{{ item.identifier }}": run udp scapy ping traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: scapy-udp-ping.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_dist: "{{ item.traffic_config.dist }}"
      tg_iat: "{{ item.traffic_config.iat }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_count: "{{ item.traffic_config.count }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_burst: "{{ item.traffic_config.burst }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_direction: "{{ item.traffic_config.direction }}"
    when: item.traffic_config.traffic_type == 'scapyudpping'
  - name: '"{{ item.identifier }}": run udp scapy throughput traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: scapy-udp-throughput.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_dist: "{{ item.traffic_config.dist }}"
      tg_iat: "{{ item.traffic_config.iat }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_count: "{{ item.traffic_config.count }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_burst: "{{ item.traffic_config.burst }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_direction: "{{ item.traffic_config.direction }}"
    when: item.traffic_config.traffic_type == 'scapyudpthroughput'
  - name: '"{{ item.identifier }}": run udp iperf traffic gen role'
    ansible.builtin.include_role:
      name: traffic-generation
      tasks_from: iperf-udp-throughput.yaml
    vars:
      tg_proto: "{{ item.traffic_config.proto }}"
      tg_direction: "{{ item.traffic_config.direction }}"
      tg_port: "{{ item.traffic_config.target_port }}"
      tg_size: "{{ item.traffic_config.size }}"
      tg_ip: "{{ item.traffic_config.target_ip }}"
      tg_duration: "{{ item.traffic_config.traffic_duration }}"
      tg_rate: "{{ item.traffic_config.rate }}"
    when: item.traffic_config.traffic_type == 'iperfthroughput'
  - name: '"{{ item.identifier }}": check for iperf errors'
    ansible.builtin.set_fact:
      gnb_job_failed_cause: "broken pipe"
      gnb_job_failed: true
    when: item.traffic_config.traffic_type == 'iperfthroughput' and iperf_ret.rc != 0



  # FIXME: post_traffic_start
  - name: Logging
    ansible.builtin.include_role:
      name: monitoring
      tasks_from: logging.yaml
    vars:
      log_prefix: "POST_TRAFFIC_START"
      log_message: "{{ item.identifier }}"
  - name: "{{ item.identifier }}: MODULE: POST_TRAFFIC_START"
    ansible.builtin.include_role:
      name: module_handler
    loop: "{{ modules.post_traffic_start }}"
    loop_control:
      loop_var: module



  - name: '"{{ item.identifier }}": wait for gnb tcpdump'
    ansible.builtin.async_status:
       jid: "{{ tcpdump_gnb.ansible_job_id }}"
    register: tcpdump_gnb_result
    until: tcpdump_gnb_result.finished
    failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
    retries: 15
    delay: 4
    become: true

  - name: '"{{ item.identifier }}": wait for ue tcpdump'
    ansible.builtin.async_status:
       jid: "{{ tcpdump_ue.ansible_job_id }}"
    register: tcpdump_ue_result
    until: tcpdump_ue_result.finished
    failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
    retries: 15
    delay: 4
    become: true



  # FIXME: post_traffic_end
  - name: Logging
    ansible.builtin.include_role:
      name: monitoring
      tasks_from: logging.yaml
    vars:
      log_prefix: "POST_TRAFFIC_END"
      log_message: "{{ item.identifier }}"
  - name: "{{ item.identifier }}: MODULE: POST_TRAFFIC_END"
    ansible.builtin.include_role:
      name: module_handler
    loop: "{{ modules.post_traffic_end }}"
    loop_control:
      loop_var: module



# INFO: cleanup block
- name: "{{ item.identifier }}: cleanup tasks"
  block:
  # Copy pcaps and params to localhost
  - name: "{{ item.identifier }}: Copy config to local: make dir"
    ansible.builtin.file:
       path: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/"
       state: directory
    delegate_to: localhost

  - name: '"{{ item.identifier }}": Remove perf stats counter'
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    ignore_errors: true
    vars:
      filepath: "{{ perf_output_csv }}"
    when: gnb_job_failed

  - name: "{{ item.identifier }}: Write FAILED label"
    ansible.builtin.copy:
      content: "{{ gnb_job_failed_cause }}"
      dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/FAILED"
    delegate_to: localhost
    when: gnb_job_failed

  - name: "{{ item.identifier }}: Copy config to local: copy"
    ansible.builtin.copy:
       content: "{{ system.fixed_params | ansible.builtin.combine( item ) | to_nice_json }}"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/{{ item.identifier }}.yaml"
    delegate_to: localhost

  # Collected artefacts dir
  - name: "{{ item.identifier }}: Copy shell output to local: compress"
    community.general.archive:
       path: "{{ collected_artefacts }}"
       dest: "{{ collected_artefacts }}.tar.gz"
       format: gz
       force_archive: true
       unsafe_writes: false
  - name: "{{ item.identifier }}: Copy shell output to local: copy"
    ansible.builtin.fetch:
       src: "{{ collected_artefacts }}.tar.gz"
       dest: "{{ system.pcap_dump }}/{{ system.identifier }}/{{ item.identifier }}/artefacts.tar.gz"
       flat: true
       validate_checksum: false
    become: true

  - name: "{{ item.identifier }}: Copy shell output to local: remove old"
    ansible.builtin.file:
       path: "{{ collected_artefacts }}"
       state: absent
    become: true


  # Artefacts from modules
  - ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ loopartefact }}"
    loop: "{{all_artefacts}}"
    loop_control:
      loop_var: loopartefact

  - name: '"{{ item.identifier }}": Copy gnb config'
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ gnb_srs_config_path }}"
      archive: false
    when: item.gnb_version.type== 'srsRAN'
  - name: '"{{ item.identifier }}": Copy gnb config'
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ gnb_oai_config_path }}"
      archive: false
    when: item.gnb_version.type== 'OAI'

  - name: '"{{ item.identifier }}": SRS log'
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ gnb_srs_logfile_path }}"
    when: item.gnb_version.type== 'srsRAN'
  - name: '"{{ item.identifier }}": SRS log'
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ gnb_oai_logfile_path }}"
    when: item.gnb_version.type== 'OAI'

  - name: '"{{ item.identifier }}": Handle PCAPs'
    when: not gnb_job_failed
    ansible.builtin.include_role:
      name: cleanup
      tasks_from: archive_fetch_and_rm
    vars:
      filepath: "{{ loopartefact }}"
    loop: ["/home/{{ ansible_user_id }}/tcpdump_gnb.pcap", "/home/{{ ansible_user_id }}/tcpdump_ue.pcap"]
    loop_control:
      loop_var: loopartefact

