- name: '"{{ item.identifier }}": killall running jammer instances'
  ansible.builtin.shell: |
     sudo systemctl stop jammer_api.service
  become: true
  ignore_errors: true
  delegate_to: 5g-core

- name: '"{{ item.identifier }}": start jammer api'
  ansible.builtin.shell: |
     sudo systemctl start jammer_api.service
  become: true
  ignore_errors: true
  delegate_to: 5g-core

- name: '"{{ item.identifier }}": copy wrapper files'
  ansible.builtin.copy:
   src: "../scripts/jammer-wrapper.py"
   dest: "jammer-wrapper.py"
   mode: "755"
  become: true
  ignore_errors: true
  delegate_to: 5g-core


- name: '"{{ item.identifier }}": jammer wrapper'
  ansible.builtin.shell: |
     sudo python3 jammer-wrapper.py --start_gain {{ item.jammer_config.start_gain }} --end_gain {{ item.jammer_config.end_gain }} --steps {{ item.jammer_config.steps }} --on {{ item.jammer_config.on_duration }} --off {{ item.jammer_config.off_duration }}
  become: true
  async: 900
  poll: 0
  ignore_errors: true
  register: jammer_job
  delegate_to: 5g-core