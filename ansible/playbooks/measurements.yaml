---

- name: Generate traffic
  hosts: 5g-gnb
  vars:
    collected_artefacts: "/tmp/artefacts"
    gnb_srs_config_path: "/home/gnb/srsRAN-configs/gnb_srs.yml"
    gnb_srs_logfile_path: "/tmp/gnb.log"
    gnb_srs_binary: "/home/gnb/srsRAN_Project/build/apps/gnb/gnb"
    gnb_oai_config_path: "/home/gnb/OAI-configs/gnb_oai.conf"
    gnb_oai_logfile_path: "/tmp/gnb.log"
    gnb_oai_binary: "/home/gnb/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"
    snr_msm_script: "/home/gnb/read-snr.sh"
    snr_msm_script_output: "/tmp/snr_ue.csv"
    perf_output_csv: "/tmp/perf_gnb.csv"

  pre_tasks:
    - name: include docker tags map
      include_vars: ../config/gnb-versions.yaml
    - name: include tinkerforge measurement points
      include_vars: ../config/tinkerforge_measurement_points.yaml
    - name: include radio config lookups
      include_vars: ../config/bandwidth.yaml
    #- name: include test definition
    #  include_vars: /mnt/darius/5G_data/config/run_definition.yaml


  tasks:
     - name: iterate over test definition
       ansible.builtin.include_role:
          name: loop-control
        # provided by testseries definition (--include_vars "@file.yaml")
       loop: "{{ run_definitions }}"
       vars:
         docker_tags_map: "{{docker_tags}}"
         tinkerforge: "{{ tinkerforge_powermsm_points }}"
