---

- name: Generate traffic
  hosts: 5g-gnb

  pre_tasks:
    - name: include test configuration
      include_vars: ../test.yaml


  tasks:
    - name: tcpdump on gnb
      ansible.builtin.command:
        cmd: sudo timeout {{ record_time + 15 }} tcpdump -ni {{ interface_gnb }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_gnb.pcap udp port 2152
      async: "{{ record_time * 3 }}"
      poll: 0
      become: true
      register: tcpdump_gnb

    - name: tcpdump on ue
      ansible.builtin.command:
        cmd: sudo timeout {{ record_time + 15 }} tcpdump -ni {{ interface_ue }} --time-stamp-precision=nano -w /home/{{ ansible_user_id }}/tcpdump_ue.pcap
      async: "{{ record_time * 3 }}"
      poll: 0
      become: true
      register: tcpdump_ue

    - name: sleep
      ansible.builtin.command:
         cmd: sleep 2
      become: false

    - name: run role
      ansible.builtin.include_role:
        name: measurements
        tasks_from: icmp.yaml

    - name: wait for gnb tcpdump
      ansible.builtin.async_status:
         jid: "{{ tcpdump_gnb.ansible_job_id }}"
      register: tcpdump_gnb_result
      until: tcpdump_gnb_result.finished
      failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
      retries: 10
      delay: 5
      become: true

    - name: wait for ue tcpdump
      ansible.builtin.async_status:
         jid: "{{ tcpdump_ue.ansible_job_id }}"
      register: tcpdump_ue_result
      until: tcpdump_ue_result.finished
      failed_when: tcpdump_gnb_result.rc != 0 and tcpdump_gnb_result.rc != 124
      retries: 10
      delay: 5
      become: true

    - name: Copy pcaps (1/2)
      ansible.builtin.fetch:
         src: /home/{{ ansible_user_id }}/tcpdump_gnb.pcap
         dest: ../dumps/
         flat: true
      become: false

    - name: Copy pcaps (2/2)
      ansible.builtin.fetch:
         src: /home/{{ ansible_user_id }}/tcpdump_ue.pcap
         dest: ../dumps/
         flat: true
      become: false




